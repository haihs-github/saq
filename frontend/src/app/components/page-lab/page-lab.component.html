      <div class="item">
        <span style="background-color: #d5e9fe; font-size: 1.2rem; display: flex; justify-content: flex-start; align-items: center; width: 300px; height: 40px; border-top-right-radius: 10px; border-top-left-radius: 10px; padding-left: 10px;">Phòng học</span>
        <div style="background-color: #d5e9fe; display: flex; flex-wrap: wrap;">
          
          <div *ngFor="let x of room" class="phong_hoc"  [ngClass]="{'red-background': x.ROOM_Status !== 'Có sẵn'}">
            <div style="display: flex; justify-content: center; color: #fff; margin-bottom: 10px;" >Tên Phòng: {{x.ROOM_Name}}</div>
            <div style="display: flex; justify-content: center; color: #fff; margin-bottom: 10px;" >Vị trí: Tòa {{x.LOCATION_Building}} tầng {{x.LOCATION_Floor}}</div>
            <div style="display: flex; justify-content: center; color: #fff; margin-bottom: 10px;" > Số lượng ghế: {{x.ROOM_Capacity}}</div>
            <div style="display: flex; justify-content: center; color: #fff; margin-bottom: 10px;" > Mô tả: {{x.ROOM_TYPE_Description}}</div>
            <!-- <div style="color: #fff;" >{{x.Description}}</div>
            <div style="color: #fff;" >{{x.Capacity}}</div> -->
            <div style="background-color: #fff; padding: 5px; border-radius: 10px; width: 80%; margin-left: 15px;">
              <a
                [routerLink]="x.ROOM_Status === 'Có sẵn' ? '/muon' : null"
                (click)="x.ROOM_Status === 'Có sẵn' && muonLab(x.ID)"
                [class.disabled-link]="x.ROOM_Status !== 'Có sẵn'"
              >
                <div style="display: flex; justify-content: center;">Đăng ký</div>
              </a>

            </div>
          </div>

        </div>
      </div>
